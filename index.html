<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Stories - By Nazareno N. Carreto Lucentino</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Inter&display=swap" rel="stylesheet">
</head>
<body>
  <div class="vhs-overlay"></div>

  <div class="vhs-hud">
  <span>REC ●</span>
  <span id="time">00:00:00</span>
</div>

  <div class="grain"></div>

  <main class="home">

    <h1 class="titulo glitch" data-text="Stories">Stories</h1>
    <h2 class="subtitulo">By Nazareno N. Carreto Lucentino</h2>

    <p class="frase">
      Mi catálogo de historias, 100% gratuito.
    </p>

    <div class="home-buttons">
      <a href="catalogo.html">Ver cuentos</a>
      <a href="sobre.html">Sobre el proyecto</a>
    </div>

  </main>

<script>
let seconds = 0;

setInterval(() => {
  seconds++;

  let hrs = String(Math.floor(seconds / 3600)).padStart(2, '0');
  let mins = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
  let secs = String(seconds % 60).padStart(2, '0');

  document.getElementById("time").textContent = `${hrs}:${mins}:${secs}`;
}, 1000);
</script>  
</body>
</html>
