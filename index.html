<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stories — Nazareno N. Carreto Lucentino</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">
</head>
<body>

  <main class="home">

    <div class="tv-wrapper">
      <div class="tv-body">
        <div class="tv-screen-frame">
          <div class="tv-screen" id="tvScreen">

            
            <!-- Ruido animado -->
            <canvas id="noiseCanvas"></canvas>

            <!-- Indicadores HUD -->
            <div class="tv-rec"><span class="dot"></span> REC</div>
            <div class="tv-channel">CH 03</div>
            <div class="tv-timestamp" id="tvTime">00:00:00</div>

            <!-- Reflejo -->
            <div class="tv-glare"></div>

            <!-- Contenido -->
            <div class="tv-content">
              <h1 class="tv-title">Stories</h1>
              <p class="tv-author">By Nazareno N. Carreto Lucentino</p>
              <div class="tv-divider"></div>

              <nav class="tv-menu">
                <a href="catalogo.html" class="tv-menu-item selected">Ver cuentos</a>
                <a href="sobre.html" class="tv-menu-item">Sobre el proyecto</a>
              </nav>
            </div>

          </div>
        </div>
      </div>
    </div>

  </main>

  <script>
    const canvas = document.getElementById('noiseCanvas');
    const ctx = canvas.getContext('2d');
    const screenEl = document.getElementById('tvScreen');
    const items = document.querySelectorAll('.tv-menu-item');
    let current = 0;

    // ── Encendido al cargar ──
    window.addEventListener('DOMContentLoaded', () => {
      screenEl.classList.add('turn-on');
    });

    // ── Ruido animado en canvas ──
    function resizeCanvas() {
      const w = screenEl.clientWidth;
      const h = screenEl.clientHeight;
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
      }
    }

    function drawNoise() {
      resizeCanvas();
      const imageData = ctx.createImageData(canvas.width, canvas.height);
      const data = imageData.data;
      for (let i = 0; i < data.length; i += 4) {
        const v = Math.random() * 255;
        data[i] = v; data[i+1] = v; data[i+2] = v;
        data[i+3] = Math.random() * 60 + 10;
      }
      ctx.putImageData(imageData, 0, 0);
      requestAnimationFrame(drawNoise);
    }
    drawNoise();

    // ── Timestamp ──
    let seconds = 0;
    setInterval(() => {
      seconds++;
      const h = String(Math.floor(seconds / 3600)).padStart(2, '0');
      const m = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
      const s = String(seconds % 60).padStart(2, '0');
      document.getElementById('tvTime').textContent = `${h}:${m}:${s}`;
    }, 1000);

    // ── Glitch ocasional ──
    function triggerGlitch() {
      screenEl.classList.add('glitching');
      setTimeout(() => screenEl.classList.remove('glitching'), 200);
      setTimeout(triggerGlitch, 5000 + Math.random() * 15000);
    }
    setTimeout(triggerGlitch, 3000 + Math.random() * 5000);

    // ── Selección de menú ──
    function updateSelection() {
      items.forEach((item, i) => item.classList.toggle('selected', i === current));
    }

    items.forEach((item, index) => {
      item.addEventListener('mouseenter', () => { current = index; updateSelection(); });
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown') { current = (current + 1) % items.length; updateSelection(); }
      else if (e.key === 'ArrowUp') { current = (current - 1 + items.length) % items.length; updateSelection(); }
      else if (e.key === 'Enter') { navigateTo(items[current].href); }
    });

    // ── Navegación con apagado ──
    function navigateTo(href) {
      screenEl.classList.remove('turn-on');
      screenEl.classList.add('turn-off');
      setTimeout(() => { window.location.href = href; }, 420);
    }

    items.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        navigateTo(link.href);
      });
    });
  </script>

</body>
</html>
