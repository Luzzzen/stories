<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo — Stories</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">
</head>
<body>

  <div class="page-wrap">

    <!-- HUD fijo -->
    <div class="page-hud">
      <span class="hud-rec"><span class="dot"></span> REC</span>
      <span>CATÁLOGO // STORIES</span>
      <span id="hudTime">00:00:00</span>
    </div>

    <main class="catalogo-wrap">

      <header>
        <a href="index.html" class="volver">← Inicio</a>
        <h1>Cuentos</h1>
        <p class="subtitle">Relatos disponibles — descarga libre y gratuita</p>
      </header>

      <a href="cuentos/el-servicio.html" class="card-link">
        <div class="card">
          <span class="id">#001</span>
          <h2>El servicio</h2>

            <p>
            Después de perderlo todo, un hombre encuentra una forma de volver a hablar con quien ya no está.
          </p>

          <div class="buttons" onclick="event.stopPropagation()">
            <a href="downloads/el-servicio.epub" onclick="handleDownload(event, 'el-servicio', this.href)">EPUB</a>
            <a href="downloads/el-servicio.pdf" onclick="handleDownload(event, 'el-servicio', this.href)">PDF</a>
          </div>
          
          <!-- contador -->
          <p class="download-count" id="count-el-servicio"></p>
          
        </div>
        
      </a>

    </main>

  </div>

  <!-- HUD timer -->
  <script>
    let s = 0;
    setInterval(() => {
      s++;
      const h = String(Math.floor(s/3600)).padStart(2,'0');
      const m = String(Math.floor((s%3600)/60)).padStart(2,'0');
      const sec = String(s%60).padStart(2,'0');
      document.getElementById('hudTime').textContent = `${h}:${m}:${sec}`;
    }, 1000);
  </script>

  <!-- Firebase (global) -->
  <script type="module" src="js/app.js"></script>

  <!-- Mostrar contador -->
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      showDownloads('el-servicio');
    });
  </script>

</body>
</html>
